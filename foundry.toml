[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.28"
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./" }]
[rpc_endpoints]
monad_testnet = "${MONAD_TESTNET_RPC_URL}"

[etherscan]
monad_testnet = { key = "${ETHERSCAN_API_KEY}", url = "https://testnet.monadexplorer.com/api" }
